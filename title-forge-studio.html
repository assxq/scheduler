<!-- TITLE FORGE STUDIO — 대본 → 제목/설명 생성기 -->
<div id="tfs-root">
<style>
  #tfs-root {
    --bg: #14110c;
    --panel: #1c1811;
    --panel2: #221d14;
    --line: #3a3120;
    --amber: #f5b942;
    --amber-dim: #a87f2c;
    --text: #e8ddc4;
    --muted: #8a7d5e;
    --ok: #7fc97f;
    --err: #e07a5f;
    font-family: 'Courier New', ui-monospace, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    box-sizing: border-box;
  }
  #tfs-root * { box-sizing: border-box; }

  .tfs-statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px; border-bottom: 1px solid var(--line);
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    background: var(--panel);
  }
  .tfs-statusbar .dot { color: var(--amber); }

  .tfs-header {
    padding: 28px 24px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .tfs-header h1 {
    margin: 0; font-size: 22px; letter-spacing: 4px; color: var(--amber);
    font-weight: 700;
  }
  .tfs-header p { margin: 8px 0 0; font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  .tfs-main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: calc(100vh - 130px); }
  @media (max-width: 900px) { .tfs-main { grid-template-columns: 1fr; } }

  .tfs-col { padding: 20px; }
  .tfs-col.left { border-right: 1px solid var(--line); }
  @media (max-width: 900px) { .tfs-col.left { border-right: none; border-bottom: 1px solid var(--line); } }

  .tfs-label {
    font-size: 11px; letter-spacing: 3px; color: var(--amber-dim);
    margin: 0 0 8px; display: flex; align-items: center; gap: 8px;
  }
  .tfs-label::before { content: "▸"; color: var(--amber); }

  .tfs-panel {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    padding: 14px; margin-bottom: 18px;
  }
  .tfs-panel::before, .tfs-panel::after {
    content: ""; position: absolute; width: 10px; height: 10px;
    border-color: var(--amber); border-style: solid;
  }
  .tfs-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .tfs-panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .tfs-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tfs-field { display: flex; flex-direction: column; gap: 4px; }
  .tfs-field label { font-size: 10px; letter-spacing: 2px; color: var(--muted); }
  .tfs-field input, .tfs-field select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    padding: 8px 10px; font-family: inherit; font-size: 13px; outline: none;
  }
  .tfs-field input:focus, .tfs-field select:focus { border-color: var(--amber-dim); }

  textarea#tfs-script {
    width: 100%; min-height: 320px; resize: vertical;
    background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    padding: 12px; font-family: inherit; font-size: 12px; line-height: 1.7; outline: none;
  }
  textarea#tfs-script:focus { border-color: var(--amber-dim); }

  .tfs-charcount { text-align: right; font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }

  button.tfs-run {
    width: 100%; padding: 14px; margin-top: 14px;
    background: var(--amber); color: #14110c; border: none;
    font-family: inherit; font-size: 14px; font-weight: 700; letter-spacing: 4px;
    cursor: pointer; transition: opacity .15s;
  }
  button.tfs-run:hover { opacity: .88; }
  button.tfs-run:disabled { background: var(--line); color: var(--muted); cursor: wait; }

  .tfs-loading {
    display: none; margin-top: 14px; padding: 12px; border: 1px dashed var(--amber-dim);
    font-size: 12px; color: var(--amber); letter-spacing: 2px; text-align: center;
  }
  .tfs-loading.on { display: block; animation: tfs-blink 1.2s infinite; }
  @keyframes tfs-blink { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .tfs-error {
    display: none; margin-top: 14px; padding: 12px; border: 1px solid var(--err);
    font-size: 12px; color: var(--err); line-height: 1.6;
  }
  .tfs-error.on { display: block; }

  .tfs-empty {
    padding: 60px 20px; text-align: center; color: var(--muted);
    font-size: 12px; letter-spacing: 2px; line-height: 2.2;
    border: 1px dashed var(--line);
  }

  .tfs-title-item {
    display: flex; gap: 10px; align-items: flex-start;
    background: var(--panel2); border: 1px solid var(--line);
    padding: 12px; margin-bottom: 8px;
  }
  .tfs-title-item .tag {
    flex-shrink: 0; font-size: 9px; letter-spacing: 1px; padding: 3px 6px;
    border: 1px solid var(--amber-dim); color: var(--amber);
  }
  .tfs-title-item .txt { flex: 1; font-size: 13px; line-height: 1.6; word-break: keep-all; }
  .tfs-copy {
    flex-shrink: 0; background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: inherit; font-size: 10px; padding: 4px 8px; cursor: pointer; letter-spacing: 1px;
  }
  .tfs-copy:hover { border-color: var(--amber); color: var(--amber); }
  .tfs-copy.done { border-color: var(--ok); color: var(--ok); }

  .tfs-desc-box {
    background: var(--panel2); border: 1px solid var(--line);
    padding: 14px; font-size: 12px; line-height: 1.8; white-space: pre-wrap;
    word-break: keep-all; max-height: 420px; overflow-y: auto;
  }
  .tfs-desc-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
</style>

<div class="tfs-statusbar">
  <span><span class="dot">●</span> TITLE FORGE STUDIO</span>
  <span id="tfs-status">READY</span>
  <span>세영에듀테크</span>
</div>

<div class="tfs-header">
  <h1>TITLE FORGE ◤</h1>
  <p>대본 입력 → 유튜브 제목 후보 + 설명란 자동 생성 · 행복한 3월 포맷</p>
</div>

<div class="tfs-main">
  <!-- LEFT: INPUT -->
  <div class="tfs-col left">
    <p class="tfs-label">SETTINGS</p>
    <div class="tfs-panel">
      <div class="tfs-settings">
        <div class="tfs-field">
          <label>채널명</label>
          <input id="tfs-channel" value="행복한 3월">
        </div>
        <div class="tfs-field">
          <label>입시 연도</label>
          <input id="tfs-year" value="2027">
        </div>
        <div class="tfs-field">
          <label>컨설턴트 이름 (비우면 대본에서 추출)</label>
          <input id="tfs-consultant" placeholder="예: 이완규 컨설턴트">
        </div>
        <div class="tfs-field">
          <label>시리즈 번호 (예: pt.1 / 비우면 생략)</label>
          <input id="tfs-part" placeholder="pt.1">
        </div>
        <div class="tfs-field">
          <label>제목 개수</label>
          <select id="tfs-count">
            <option value="5">5개</option>
            <option value="7" selected>7개</option>
            <option value="10">10개</option>
          </select>
        </div>
        <div class="tfs-field">
          <label>Anthropic API 키 (로컬/배포 실행 시 필수)</label>
          <input id="tfs-apikey" type="password" placeholder="sk-ant-...">
        </div>
      </div>
    </div>

    <p class="tfs-label">TRANSCRIPT INPUT</p>
    <textarea id="tfs-script" placeholder="여기에 대본(타임스탬프 포함 SRT/TXT)을 붙여넣으세요..."></textarea>
    <div class="tfs-charcount"><span id="tfs-chars">0</span> CHARS</div>

    <button class="tfs-run" id="tfs-run">◤ GENERATE ◢</button>
    <div class="tfs-loading" id="tfs-loading">ANALYZING TRANSCRIPT...</div>
    <div class="tfs-error" id="tfs-err"></div>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="tfs-col">
    <p class="tfs-label">TITLE CANDIDATES</p>
    <div id="tfs-titles"><div class="tfs-empty">대본을 입력하고 GENERATE를 누르면<br>제목 후보가 여기에 표시됩니다</div></div>

    <p class="tfs-label" style="margin-top: 24px;">YOUTUBE DESCRIPTION</p>
    <div id="tfs-desc"><div class="tfs-empty">유튜브 설명란이 여기에 생성됩니다<br>(챕터 타임스탬프 + 해시태그 포함)</div></div>
  </div>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);
  const scriptEl = $('tfs-script');

  scriptEl.addEventListener('input', () => {
    $('tfs-chars').textContent = scriptEl.value.length.toLocaleString();
  });

  // API 키 저장/복원 — 로컬/배포 환경에서만 동작, 아티팩트 환경에선 조용히 무시
  try {
    const saved = localStorage.getItem('tfs-apikey');
    if (saved) $('tfs-apikey').value = saved;
  } catch (e) {}
  $('tfs-apikey').addEventListener('change', () => {
    try { localStorage.setItem('tfs-apikey', $('tfs-apikey').value.trim()); } catch (e) {}
  });

  function copyBtn(text) {
    const b = document.createElement('button');
    b.className = 'tfs-copy';
    b.textContent = 'COPY';
    b.onclick = async () => {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
      }
      b.textContent = 'COPIED'; b.classList.add('done');
      setTimeout(() => { b.textContent = 'COPY'; b.classList.remove('done'); }, 1500);
    };
    return b;
  }

  function renderTitles(titles) {
    const wrap = $('tfs-titles');
    wrap.innerHTML = '';
    titles.forEach(t => {
      const item = document.createElement('div');
      item.className = 'tfs-title-item';
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = t.type || 'TITLE';
      const txt = document.createElement('span');
      txt.className = 'txt';
      txt.textContent = t.title;
      item.appendChild(tag);
      item.appendChild(txt);
      item.appendChild(copyBtn(t.title));
      wrap.appendChild(item);
    });
  }

  function renderDesc(desc) {
    const wrap = $('tfs-desc');
    wrap.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'tfs-desc-box';
    box.textContent = desc;
    const actions = document.createElement('div');
    actions.className = 'tfs-desc-actions';
    actions.appendChild(copyBtn(desc));
    wrap.appendChild(box);
    wrap.appendChild(actions);
  }

  function buildPrompt() {
    const channel = $('tfs-channel').value.trim() || '행복한 3월';
    const year = $('tfs-year').value.trim() || '2027';
    const consultant = $('tfs-consultant').value.trim();
    const part = $('tfs-part').value.trim();
    const count = $('tfs-count').value;
    const transcript = scriptEl.value.trim();

    return `당신은 한국 입시 교육 유튜브 채널 "${channel}"의 전문 제목/메타데이터 작가입니다.

아래는 이 채널의 실제 제목 스타일 레퍼런스입니다. 이 패턴을 반드시 학습하고 따르세요:

레퍼런스 1: "2027 수의과 대학 수시 설명회📌서울대, 건국대, 강원도, 충북대, 충남대, 전북대, 전남대, 경북대, 경상국립대, 제주대 📌행복한 3월_김윤 컨설턴트"
레퍼런스 2: "📌[중앙대학교 실전 논술 대비법] 2027 박기호논술 Q&A, 창의형 vs 일반형 리뷰 pt.2"
레퍼런스 3: "📌2027 수리논술 지원 전략_신용화 대표님과 함께하는 입시역전 솔루션 pt.3"

패턴 핵심:
- 연도(${year}) + 대학명/주제를 앞에 배치
- 📌 이모지로 시선 고정 (제목 맨 앞 또는 구분자로 사용)
- "${channel}", 컨설턴트 실명으로 신뢰도 부여
- 시리즈물은 pt 넘버링${part ? ` (이번 영상: ${part})` : ''}
- "설명회/대비법/솔루션/전략/가이드" 같은 실용 키워드 마무리
${consultant ? `- 컨설턴트 이름: ${consultant} (반드시 이 이름을 사용)` : '- 컨설턴트/출연자 이름은 대본에서 정확히 추출하여 사용 (음성인식 오류로 이름 표기가 흔들릴 수 있으니 가장 많이 등장하는 표기 채택)'}

작업:
1. 제목 후보 ${count}개를 세 유형으로 나눠 생성:
   - "기본형": 레퍼런스 패턴에 충실한 정보형 (검색 유입용)
   - "후킹형": 대본 속 컨설턴트의 직설적/파격적 발언을 따옴표로 인용하거나, 놓치면 손해인 핵심 정보를 앞세운 클릭 유도형
   - "시리즈형": 연작 브랜딩을 고려한 형태
   유형별로 골고루 배분하되 후킹형을 가장 많이.

2. 유튜브 설명란 1개 생성. 구성:
   - 첫 2~3줄: 영상 핵심 요약 (검색 노출되는 부분이므로 핵심 키워드 포함, 후킹력 있게)
   - 빈 줄
   - 챕터 타임스탬프: 대본의 타임스탬프를 기반으로 "00:00 챕터명" 형식. 대본에 섹션 구분이 있으면 그대로 활용, 없으면 내용 흐름으로 추정
   - 빈 줄
   - 채널/컨설턴트 소개 및 상담 유도 문구 2~3줄
   - 빈 줄
   - 해시태그 8~12개 (#수시 #입시 등 검색 최적화)

주의사항:
- 대본의 음성인식(STT) 오류를 감안하여 대학명, 전형명, 인명, 숫자를 문맥으로 교정할 것 (예: "기아" → "기하", "미족" → "미적분", "삼업 4" → "3합 4")
- 제목에 과장된 허위 정보 금지. 대본에 실제로 나온 내용만 사용
- 제목은 유튜브 잘림을 고려해 핵심을 앞 40자 안에 배치

반드시 아래 형식으로만 응답하세요. 다른 설명, 서문, 마크다운 백틱 일절 금지:

[TITLE][기본형] 첫 번째 제목
[TITLE][후킹형] 두 번째 제목
[TITLE][시리즈형] 세 번째 제목
(제목 ${count}개를 각 줄마다 [TITLE][유형] 으로 시작)
[DESC]
설명란 전체 텍스트 (줄바꿈 자유롭게 사용)
[/DESC]

=== 대본 시작 ===
${transcript}
=== 대본 끝 ===`;
  }

  $('tfs-run').addEventListener('click', async () => {
    const transcript = scriptEl.value.trim();
    const errEl = $('tfs-err');
    errEl.classList.remove('on');

    if (transcript.length < 100) {
      errEl.textContent = 'ERROR: 대본이 너무 짧습니다. 최소 100자 이상 입력하세요.';
      errEl.classList.add('on');
      return;
    }

    const btn = $('tfs-run');
    btn.disabled = true;
    $('tfs-loading').classList.add('on');
    $('tfs-status').textContent = 'PROCESSING';

    try {
      const apiKey = $('tfs-apikey').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) {
        // 로컬 파일 / GitHub Pages 등 claude.ai 바깥에서 실행하는 경우
        headers['x-api-key'] = apiKey;
        headers['anthropic-version'] = '2023-06-01';
        headers['anthropic-dangerous-direct-browser-access'] = 'true';
      }

      let response;
      try {
        response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 4000,
            messages: [{ role: 'user', content: buildPrompt() }]
          })
        });
      } catch (netErr) {
        if (!apiKey) {
          throw new Error('네트워크 요청 실패. claude.ai 바깥(로컬 파일/배포 사이트)에서 실행 중이라면 설정에 Anthropic API 키를 입력해야 합니다. console.anthropic.com에서 발급 가능.');
        }
        throw new Error('네트워크 요청 실패. 인터넷 연결 또는 API 키를 확인하세요.');
      }

      const data = await response.json();

      if (data.error) {
        const msg = data.error.message || 'API 오류';
        if (/authentication|api.key|x-api-key/i.test(msg)) {
          throw new Error('API 키 인증 실패: ' + msg);
        }
        throw new Error(msg);
      }

      const raw = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');

      // [TITLE][유형] 제목 형식 파싱 — 따옴표/특수문자에 안전
      const titles = [];
      const titleRe = /^\[TITLE\]\[([^\]]+)\]\s*(.+)$/gm;
      let m;
      while ((m = titleRe.exec(raw)) !== null) {
        titles.push({ type: m[1].trim(), title: m[2].trim() });
      }

      // [DESC] ... [/DESC] 파싱, 닫는 태그가 잘렸으면 끝까지 사용
      let description = '';
      const descMatch = raw.match(/\[DESC\]\s*([\s\S]*?)\s*\[\/DESC\]/);
      if (descMatch) {
        description = descMatch[1].trim();
      } else {
        const openIdx = raw.indexOf('[DESC]');
        if (openIdx !== -1) description = raw.slice(openIdx + 6).trim();
      }

      if (!titles.length) throw new Error('제목 생성 실패. 다시 시도해 주세요.');

      renderTitles(titles);
      renderDesc(description);
      $('tfs-status').textContent = 'DONE · ' + titles.length + ' TITLES';
    } catch (e) {
      errEl.textContent = 'ERROR: ' + e.message;
      errEl.classList.add('on');
      $('tfs-status').textContent = 'ERROR';
    } finally {
      btn.disabled = false;
      $('tfs-loading').classList.remove('on');
    }
  });
})();
</script>
</div>
